<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <!-- Dollar sign icon -->
  <rect x="2" y="6" width="36" height="36" rx="8" fill="url(#g)"/>
  <text x="20" y="31" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">$</text>
  <!-- Payroll lines -->
  <rect x="46" y="14" width="18" height="3" rx="1.5" fill="#0891b2"/>
  <rect x="46" y="21" width="14" height="3" rx="1.5" fill="#0891b2" opacity=".6"/>
  <rect x="46" y="28" width="16" height="3" rx="1.5" fill="#0891b2" opacity=".4"/>
  <!-- Checkmark -->
