  <!-- Text -->
  <text x="88" y="32" font-family="Arial,sans-serif" font-size="19" font-weight="800" fill="#0f172a" letter-spacing="-0.5">Payroll<tspan fill="#0891b2">Fix</tspan>Pro</text>
